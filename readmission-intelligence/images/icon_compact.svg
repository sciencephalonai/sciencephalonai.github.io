<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- SciEncephalon Compact Icon — Neural Brain with AI Badge -->
  <defs>
    <linearGradient id="badge_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00a3cc" />
      <stop offset="100%" stop-color="#0076a3" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Audiowide&amp;display=swap');
    </style>
  </defs>

  <rect width="200" height="200" rx="40" fill="#f8fafc" />

  <!-- S and E Typography Icon -->
  <text x="100" y="125" font-family="'Audiowide', sans-serif" font-size="80" text-anchor="middle" font-weight="400" letter-spacing="-0.02em">
    <tspan fill="#00a3cc">S</tspan><tspan fill="#1a2744">E</tspan>
  </text>

  <!-- AI Badge: Positioned close to SE, larger size -->
  <rect x="148" y="38" width="50" height="30" rx="15" fill="url(#badge_grad)" />
  <text x="173" y="59" font-family="'Audiowide', sans-serif" font-size="18" fill="white" text-anchor="middle">AI</text>
</svg>
